apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-enablement-config
data:
  VITE_API_BASE_URL: "http://team-ai-enablement-backend:8000"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-ai-enablement-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: team-ai-enablement-backend
  template:
    metadata:
      labels:
        app: team-ai-enablement-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/example/team-ai-enablement-backend:latest
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: team-ai-enablement-backend
spec:
  selector:
    app: team-ai-enablement-backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: team-ai-enablement-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: team-ai-enablement-frontend
  template:
    metadata:
      labels:
        app: team-ai-enablement-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/example/team-ai-enablement-frontend:latest
          envFrom:
            - configMapRef:
                name: ai-enablement-config
          ports:
            - containerPort: 4173
---
apiVersion: v1
kind: Service
metadata:
  name: team-ai-enablement-frontend
spec:
  selector:
    app: team-ai-enablement-frontend
  ports:
    - port: 80
      targetPort: 4173
