name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run backend tests
        run: python -m pytest

      - name: Run frontend tests
        run: npm run test

      - name: Regenerate Cloudflare data bundle
        run: npm run cf:export-data

      - name: Verify generated bundle is committed
        run: git diff --exit-code -- cloudflare/generated/static-data.ts

      - name: Build production frontend
        run: npm run build
